<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Mission Control 控制台</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #111827;
            color: white;
            padding: 30px 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 32px;
            color: #38bdf8;
            margin-bottom: 8px;
        }

        .header p {
            color: #9ca3af;
            font-size: 16px;
        }

        .task-card {
            background: #1f2937;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            border-left: 4px solid #38bdf8;
        }

        .task-title {
            font-size: 20px;
            font-weight: 600;
            color: #f3f4f6;
            margin-bottom: 12px;
        }

        .subtask {
            background: #374151;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .subtask::before {
            content: "✅";
            font-size: 14px;
        }

        .info-box {
            background: #1e293b;
            padding: 16px 20px;
            border-radius: 10px;
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            color: #a5f3fc;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Mission Control 控制面板</h1>
            <p>任务可视化界面 · 清晰易懂 · 自动加载</p>
        </div>

        <div id="taskList"></div>

        <div class="info-box">
            <div>版本: <span id="version">-</span></div>
            <div>定时任务: 已加载</div>
        </div>
    </div>

    <script>
        async function loadAll() {
            // 加载 tasks
            const taskRes = await fetch("tasks.json");
            const tasks = await taskRes.json();

            // 加载 version
            const verRes = await fetch("version.json");
            const ver = await verRes.json();
            document.getElementById("version").textContent = ver.version;

            // 渲染界面
            const container = document.getElementById("taskList");

            tasks.tasks.forEach(task => {
                const card = document.createElement("div");
                card.className = "task-card";

                let title = `<div class="task-title">${task.title}</div>`;
                let subs = '';

                task.subtasks.forEach(sub => {
                    subs += `<div class="subtask">${sub.title}</div>`;
                });

                card.innerHTML = title + subs;
                container.appendChild(card);
            });
        }

        loadAll();
    </script>
</body>
</html>
